<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>CARDIA Data Dictionary</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="description" content="Browse harmonized measures across CARDIA exam waves. Search and filter thousands of concepts by type, domain, instrument, and exam availability."/>
<meta property="og:title" content="CARDIA Data Dictionary"/>
<meta property="og:description" content="Browse harmonized measures across CARDIA exam waves."/>
<meta property="og:type" content="website"/>
<link href="assets/style.css" rel="stylesheet"/>
<style>
body{margin:0 auto}
.idx-intro{padding:16px 24px 10px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:16px;max-width:1100px;margin:0 auto}
.idx-intro div{flex:1}
.idx-intro h1{font-size:26px;margin:0;letter-spacing:-0.02em}
.idx-intro p{color:var(--muted);font-size:14px;margin:6px 0 0;line-height:1.5}
.idx-intro .logo{flex:0 0 auto;max-height:80px;opacity:0.85;margin-right:40px}
.idx-body{padding:0 24px 24px;max-width:1100px;margin:0 auto}

/* Filter rows */
.filter-row-wrap{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:0.08em;min-width:80px;padding-top:6px;flex-shrink:0}
.filter-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1}

/* Chip styles */
.fc{display:inline-flex;align-items:center;font-size:12px;font-weight:500;cursor:pointer;
  border:1px solid transparent;transition:all .12s;white-space:nowrap;user-select:none}
.fc:hover{opacity:.8}
.fc.type{padding:3px 12px;border-radius:999px;color:#5ea3d4;border-color:#5ea3d430}
.fc.type.on{background:#5ea3d420;border-color:#5ea3d4}
.fc.source{padding:3px 12px;border-radius:999px;color:#2dd4bf;border-color:#2dd4bf30}
.fc.source.on{background:#2dd4bf20;border-color:#2dd4bf}
.fc.group{padding:3px 12px;border-radius:999px;color:#a78bfa;border-color:#a78bfa30}
.fc.group.on{background:#a78bfa20;border-color:#a78bfa}
.fc.exam{padding:3px 10px;border-radius:4px;color:#f59e0b;border-color:#f59e0b30;font-weight:700;font-size:11px}
.fc.exam.on{background:#f59e0b20;border-color:#f59e0b}

/* Instrument dropdown */
.inst-wrap{position:relative;flex:1;max-width:400px}
.inst-btn{width:100%;padding:6px 12px;border-radius:6px;border:1px solid #d4a44a30;
  background:var(--bg-surface);color:#d4a44a;font-size:12px;cursor:pointer;text-align:left;
  display:flex;justify-content:space-between;align-items:center}
.inst-btn:hover{border-color:#d4a44a}
.inst-btn .arrow{font-size:10px;margin-left:8px}
.inst-drop{position:absolute;top:100%;left:0;right:0;max-height:280px;overflow-y:auto;
  background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;z-index:160;
  margin-top:4px;display:none;padding:4px}
.inst-drop.open{display:block}
.inst-drop input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:4px;
  background:var(--bg);color:var(--ink);font-size:12px;margin-bottom:4px;outline:none}
.inst-drop input::placeholder{color:var(--muted)}
.inst-item{padding:5px 10px;border-radius:4px;font-size:12px;color:#d4a44a;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center}
.inst-item:hover{background:var(--border)}.inst-item.sel{background:#d4a44a18}
.inst-item .ct{color:var(--muted);font-size:10px}

/* Controls bar */
.controls-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.active-filters{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.af-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;
  font-size:11px;font-weight:500;cursor:pointer}
.af-chip.af-form{color:#d4a44a;border:1px solid #d4a44a55;border-radius:6px}
.af-chip.af-type{color:#5ea3d4;border:1px solid #5ea3d455}
.af-chip.af-source{color:#2dd4bf;border:1px solid #2dd4bf55}
.af-chip.af-group{color:#a78bfa;border:1px solid #a78bfa55}
.af-chip.af-exam{color:#f59e0b;border:1px solid #f59e0b55;border-radius:4px}
.af-chip .x{opacity:.6;margin-left:2px}
.clear-btn{color:#ef4444;cursor:pointer;font-size:11px;border:1px solid #ef444433;
  padding:3px 8px;border-radius:999px;background:none}
.sort-ctl{margin-left:auto;display:flex;align-items:center;gap:4px}
.sort-ctl label{font-size:11px;color:var(--muted)}
.sort-ctl select{font-size:11px;padding:3px 6px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg-surface);color:var(--ink);cursor:pointer}

/* Sticky result count */
.result-bar{position:sticky;top:49px;z-index:150;background:var(--bg);
  padding:6px 0;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);margin:0 0 12px}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.concept-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;transition:all .15s}
.concept-card:hover{border-color:var(--accent);background:var(--bg-elevated)}
.concept-card h3{margin:0 0 2px;font-size:15px;font-weight:600}
.concept-card h3 a{color:var(--ink);text-decoration:none}
.concept-card h3 a:hover{text-decoration:underline}
.concept-card .cid{font-size:11px;font-family:monospace;color:var(--muted);margin-bottom:7px}
.concept-card .card-desc{font-size:12px;color:var(--muted);line-height:1.45;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.concept-card .card-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.cc{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;border:1px solid transparent}
.cc-type{color:#5ea3d4;border-color:#5ea3d433}
.cc-source{color:#2dd4bf;border-color:#2dd4bf33}
.cc-form{color:#d4a44a;border-color:#d4a44a33;border-radius:4px}
.cc-group{color:#a78bfa;border-color:#a78bfa33}
.cc-unit{color:var(--muted);border-color:var(--border)}
.cc-levels{color:var(--muted);border-color:var(--border)}
.exam-dots{display:flex;gap:3px}
.exam-dot{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:600;background:var(--accent-muted);
  color:var(--accent);border:1px solid var(--accent)}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted);grid-column:1/-1}
.empty-state h3{margin:0 0 8px;font-size:16px;color:var(--ink)}
.empty-state p{margin:0;font-size:13px}
.cap-msg{text-align:center;padding:16px;font-size:13px;color:var(--muted);grid-column:1/-1}
.dd-footer{margin-top:36px;text-align:center;font-size:12px;color:var(--muted)}
@media (max-width:600px){
  body{overflow-x:hidden}
  .site-header{padding:8px 12px;gap:8px;flex-wrap:wrap}
  .site-search{min-width:0;max-width:none;flex:1 1 auto;font-size:14px}
  .idx-intro{padding:12px 14px 0}
  .idx-intro h1{font-size:22px}
  .idx-intro .logo{max-height:60px}
  .idx-body{padding:0 14px 20px}
  .filter-row-wrap{gap:6px}
  .filter-label{min-width:60px;font-size:9px}
  .fc{font-size:11px;padding:3px 8px}
  .inst-wrap{max-width:none}
  .controls-bar{flex-direction:column;align-items:stretch}
  .sort-ctl{margin-left:0;justify-content:flex-end}
  .card-grid{grid-template-columns:1fr;gap:10px}
  .concept-card{padding:12px 14px}
  .result-bar{top:auto;position:relative}
}
</style></head><body>
<header class="site-header">
  <a href="index.html" class="site-brand">CARDIA Data Dictionary</a>
  <input class="site-search" type="text" id="search" placeholder="Search concepts&hellip;"/>
  <button class="theme-toggle" id="theme-toggle" title="Toggle theme">&#9790;</button>
</header>
<div class="idx-intro">
  <div>
    <h1>CARDIA Data Dictionary</h1>
    <p>Browse harmonized measures across CARDIA exam waves.<br>
    Click any concept to view distributions, stratified summaries, and harmonization details.</p>
  </div>
  <img class="logo" src="assets/CARDIA-logo.jpg" alt="CARDIA logo"/>
</div>
<div class="idx-body">
<div id="filters"></div>
<div class="controls-bar">
  <div class="active-filters" id="active"></div>
  <div class="sort-ctl">
    <label for="min-exams">Min. exams:</label>
    <select id="min-exams"><option value="0">Any</option></select>
    <label for="sort-sel">Sort:</label>
    <select id="sort-sel"><option value="exams">Most exams</option><option value="alpha">A &rarr; Z</option></select>
  </div>
</div>
<div class="result-bar" id="count"></div>
<div class="card-grid" id="grid"></div>
<div class="dd-footer" id="footer"></div>
</div>
<script src="catalog.inline.js"></script>
<script src="assets/theme.js"></script>
<script>
(async function(){
let cat;
try{const r=await fetch("catalog.json");if(r.ok)cat=await r.json()}catch(e){}
if(!cat&&window.__CATALOG)cat=window.__CATALOG;
if(!cat){document.getElementById("count").textContent="Could not load catalog.json";return}

let SYN={};
try{const r=await fetch("synonyms.json");if(r.ok)SYN=await r.json()}catch(e){}

const MAX_CARDS=100;

const KNOWN_GROUPS=new Set(["Administrative","Anthropometry","Brain & Cognitive","Cardiovascular",
  "Chemistry","Dermatology","Diet","Endocrine","Exercise Testing","Glycemia","Inflammation",
  "Lipids","Medical History","Medications","Physical Activity","Psychosocial","Pulmonary",
  "Renal","Reproductive Health","Sensory","Sleep","Social & Neighborhood","Sociodemographic",
  "Specimen Collection","Substance Use"]);
const TYPES=new Set(["numeric","categorical"]);
const SOURCES=new Set(["Lab","Imaging"]);
function asArr(v){return Array.isArray(v)?v:v?[v]:[]}
const EXAM_LETTERS=[...new Set(cat.flatMap(c=>asArr(c.exams)))].sort();

function classify(ch){
  if(TYPES.has(ch))return"type";
  if(SOURCES.has(ch))return"source";
  if(/\xb7/.test(ch))return"form";
  if(KNOWN_GROUPS.has(ch))return"group";
  if(/^\d+\s*level/.test(ch))return"levels";
  return"unit";
}

const allC=[...new Set(cat.flatMap(c=>Array.isArray(c.chips)?c.chips:c.chips?[c.chips]:[]))];
const buckets={type:[],source:[],form:[],group:[]};
allC.forEach(ch=>{const t=classify(ch);if(buckets[t])buckets[t].push(ch)});
Object.values(buckets).forEach(b=>b.sort((a,b)=>a.localeCompare(b)));

const formCounts={};
buckets.form.forEach(f=>{formCounts[f]=cat.filter(c=>{const ch=Array.isArray(c.chips)?c.chips:c.chips?[c.chips]:[];return ch.includes(f)}).length});

/* Populate min-exams dropdown */
const minExSel=document.getElementById("min-exams");
const maxExams=Math.max(...cat.map(c=>asArr(c.exams).length));
for(var i=1;i<maxExams;i++){var o=document.createElement("option");o.value=i;o.textContent=i+"+";minExSel.appendChild(o)}
var oAll=document.createElement("option");oAll.value=maxExams;oAll.textContent="All";minExSel.appendChild(oAll);

/* State */
let aC=[];
let aExams=[];
let sortMode="exams";
let minExams=0;

/* DOM refs */
const fE=document.getElementById("filters"),gE=document.getElementById("grid");
const cE=document.getElementById("count"),sE=document.getElementById("search");
const actE=document.getElementById("active"),sortSel=document.getElementById("sort-sel");
document.getElementById("footer").textContent="CARDIA Data Dictionary \u00b7 "+cat.length+" concepts";

/* Restore state from URL */
const params=new URLSearchParams(location.search);
if(params.get("q"))sE.value=params.get("q");
if(params.get("chip")){params.get("chip").split(",").forEach(function(c){if(allC.includes(c))aC.push(c)})}
if(params.get("exam")){params.get("exam").split(",").forEach(function(e){if(EXAM_LETTERS.includes(e))aExams.push(e)})}
if(params.get("sort")==="alpha"){sortMode="alpha";sortSel.value="alpha"}
if(params.get("minExams")){var me=parseInt(params.get("minExams"));if(me>=1&&me<=maxExams){minExams=me;minExSel.value=me}}

let instOpen=false;

function toggle(ch){aC=aC.includes(ch)?aC.filter(x=>x!==ch):[...aC,ch];render()}
function toggleType(ch){
  const wasOn=aC.includes(ch);
  aC=aC.filter(x=>classify(x)!=="type");
  if(!wasOn)aC.push(ch);
  render();
}
function toggleExam(ex){aExams=aExams.includes(ex)?aExams.filter(x=>x!==ex):[...aExams,ex];render()}
function toggleForm(ch){
  const wasOn=aC.includes(ch);
  aC=aC.filter(x=>classify(x)!=="form");
  if(!wasOn)aC.push(ch);
  render();
}

function renderFilters(){
  fE.innerHTML="";

  const r1=document.createElement("div");r1.className="filter-row-wrap";
  r1.innerHTML="<div class=\"filter-label\">Type</div>";
  const p1=document.createElement("div");p1.className="filter-pills";
  buckets.type.forEach(ch=>{const s=document.createElement("span");
    s.className="fc type"+(aC.includes(ch)?" on":"");s.textContent=ch;
    s.onclick=()=>toggleType(ch);p1.appendChild(s)});
  r1.appendChild(p1);fE.appendChild(r1);

  if(buckets.source.length){
    const r2=document.createElement("div");r2.className="filter-row-wrap";
    r2.innerHTML="<div class=\"filter-label\">Source</div>";
    const p2=document.createElement("div");p2.className="filter-pills";
    buckets.source.forEach(ch=>{const s=document.createElement("span");
      s.className="fc source"+(aC.includes(ch)?" on":"");s.textContent=ch;
      s.onclick=()=>toggle(ch);p2.appendChild(s)});
    r2.appendChild(p2);fE.appendChild(r2);
  }

  const r3=document.createElement("div");r3.className="filter-row-wrap";
  r3.innerHTML="<div class=\"filter-label\">Instrument</div>";
  const wrap=document.createElement("div");wrap.className="inst-wrap";
  const selForms=aC.filter(ch=>classify(ch)==="form");
  const btnText=selForms.length?selForms[0]:"All instruments";
  const btn=document.createElement("div");btn.className="inst-btn";
  btn.innerHTML=btnText+"<span class=\"arrow\">\u25BC</span>";
  const drop=document.createElement("div");drop.className="inst-drop"+(instOpen?" open":"");
  const sinp=document.createElement("input");sinp.placeholder="Filter instruments...";
  sinp.onclick=e=>e.stopPropagation();
  drop.appendChild(sinp);
  buckets.form.forEach(ch=>{
    const item=document.createElement("div");
    item.className="inst-item"+(aC.includes(ch)?" sel":"");
    item.innerHTML=ch+"<span class=\"ct\">"+formCounts[ch]+"</span>";
    item.onclick=e=>{e.stopPropagation();toggleForm(ch)};
    item.dataset.label=ch.toLowerCase();
    drop.appendChild(item)});
  sinp.addEventListener("input",()=>{const q=sinp.value.toLowerCase();
    drop.querySelectorAll(".inst-item").forEach(it=>{
      it.style.display=it.dataset.label.includes(q)?"":"none"})});
  btn.onclick=e=>{e.stopPropagation();instOpen=!instOpen;drop.classList.toggle("open")};
  wrap.appendChild(btn);wrap.appendChild(drop);r3.appendChild(wrap);fE.appendChild(r3);

  const r4=document.createElement("div");r4.className="filter-row-wrap";
  r4.innerHTML="<div class=\"filter-label\">Domain</div>";
  const p4=document.createElement("div");p4.className="filter-pills";
  buckets.group.forEach(ch=>{const s=document.createElement("span");
    s.className="fc group"+(aC.includes(ch)?" on":"");s.textContent=ch;
    s.onclick=()=>toggle(ch);p4.appendChild(s)});
  r4.appendChild(p4);fE.appendChild(r4);

  const r5=document.createElement("div");r5.className="filter-row-wrap";
  r5.innerHTML="<div class=\"filter-label\">Exam</div>";
  const p5=document.createElement("div");p5.className="filter-pills";
  EXAM_LETTERS.forEach(ex=>{const s=document.createElement("span");
    s.className="fc exam"+(aExams.includes(ex)?" on":"");s.textContent=ex;
    s.onclick=()=>toggleExam(ex);p5.appendChild(s)});
  r5.appendChild(p5);fE.appendChild(r5);
}

function renderActive(){
  actE.innerHTML="";
  if(!aC.length&&!aExams.length&&!minExams)return;
  aC.forEach(ch=>{const s=document.createElement("span");
    const t=classify(ch);s.className="af-chip af-"+t;
    s.innerHTML=ch+"<span class=\"x\">\u2715</span>";
    s.onclick=()=>toggle(ch);actE.appendChild(s)});
  aExams.forEach(ex=>{const s=document.createElement("span");
    s.className="af-chip af-exam";
    s.innerHTML="Exam "+ex+"<span class=\"x\">\u2715</span>";
    s.onclick=()=>toggleExam(ex);actE.appendChild(s)});
  if(minExams>0){const s=document.createElement("span");
    s.className="af-chip af-exam";
    s.innerHTML=minExams+"+ exams<span class=\"x\">\u2715</span>";
    s.onclick=()=>{minExams=0;minExSel.value=0;render()};actE.appendChild(s)}
  const cb=document.createElement("button");cb.className="clear-btn";
  cb.textContent="clear all";cb.onclick=()=>{aC=[];aExams=[];minExams=0;minExSel.value=0;sE.value="";render()};actE.appendChild(cb);
}

function cardChipClass(ch){return"cc cc-"+classify(ch)}

function expandQuery(q){
  var terms=[q];
  Object.keys(SYN).forEach(function(k){
    if(q.includes(k.toLowerCase())){
      var syns=SYN[k];if(Array.isArray(syns))terms=terms.concat(syns.map(function(s){return s.toLowerCase()}));
    }
  });
  return terms;
}

const featured=cat.filter(c=>{
  return asArr(c.exams).length>=maxExams;
}).sort((a,b)=>a.title.localeCompare(b.title)).slice(0,20);

function isFiltering(){
  return sE.value.trim().length>0||aC.length>0||aExams.length>0||minExams>0;
}

function sortList(list){
  if(sortMode==="exams") return list.sort((a,b)=>{
    const ae=Array.isArray(a.exams)?a.exams.length:a.exams?1:0;
    const be=Array.isArray(b.exams)?b.exams.length:b.exams?1:0;
    return be-ae||a.title.localeCompare(b.title);
  });
  return list.sort((a,b)=>a.title.localeCompare(b.title));
}

function renderCards(list,total){
  gE.innerHTML="";
  if(!list.length){
    gE.innerHTML="<div class=\"empty-state\"><h3>No concepts found</h3><p>Try broadening your search or clearing some filters.</p></div>";
    return;
  }
  list.forEach(c=>{
    const sl=c.concept_id.replace(/[^A-Za-z0-9]+/g,"_");
    const chips=Array.isArray(c.chips)?c.chips:c.chips?[c.chips]:[];
    const exams=asArr(c.exams);
    const d=document.createElement("div");d.className="concept-card";
    const chipHtml=chips.map(ch=>{
      const t=classify(ch);
      if(t==="unit"||t==="levels")return"<span class=\"cc cc-"+t+"\">"+ch+"</span>";
      return"<a class=\""+cardChipClass(ch)+"\" href=\"index.html?chip="+encodeURIComponent(ch)+"\">"+ch+"</a>"
    }).join(" ");
    const examHtml=exams.map(e=>"<span class=\"exam-dot\">"+e+"</span>").join("");
    const descSnip=c.description?"<div class=\"card-desc\">"+c.description+"</div>":"";
    d.innerHTML="<h3><a href=\""+sl+".html\">"+c.title+"</a></h3>"+
      "<div class=\"cid\">"+c.concept_id+"</div>"+descSnip+
      "<div class=\"card-chips\">"+chipHtml+"</div>"+
      "<div class=\"exam-dots\">"+examHtml+"</div>";
    gE.appendChild(d);
  });
  if(total>MAX_CARDS){
    const m=document.createElement("div");m.className="cap-msg";
    m.textContent="Showing "+MAX_CARDS+" of "+total+" concepts \u2014 refine your search to see more.";
    gE.appendChild(m);
  }
}

function pushState(){
  const p=new URLSearchParams();
  const q=sE.value.trim();
  if(q)p.set("q",q);
  if(aC.length)p.set("chip",aC.join(","));
  if(aExams.length)p.set("exam",aExams.join(","));
  if(sortMode!=="exams")p.set("sort",sortMode);
  if(minExams>0)p.set("minExams",String(minExams));
  var qs=p.toString();
  history.replaceState(null,"",qs?("?"+qs):location.pathname);
}

function render(){
  const q=sE.value.toLowerCase().trim();
  const qTerms=q?expandQuery(q):[];
  sortMode=sortSel.value;
  minExams=parseInt(minExSel.value)||0;
  renderFilters();renderActive();
  pushState();
  if(!isFiltering()&&sortMode==="exams"){
    sortList(featured);
    cE.textContent="Showing "+featured.length+" featured concepts \u2014 search or filter to explore all "+cat.length;
    renderCards(featured,featured.length);
    return;
  }
  if(!isFiltering()&&sortMode==="alpha"){
    var allSorted=cat.slice();sortList(allSorted);
    var total=allSorted.length;var shown=allSorted.slice(0,MAX_CARDS);
    cE.textContent=total+" concepts"+(total>MAX_CARDS?" (showing first "+MAX_CARDS+")":"");
    renderCards(shown,total);
    return;
  }
  const fl=cat.filter(c=>{
    const chips=Array.isArray(c.chips)?c.chips:c.chips?[c.chips]:[];
    const exams=asArr(c.exams);
    if(qTerms.length){
      const kw=Array.isArray(c.keywords)?c.keywords.join(" "):c.keywords||"";
      const desc=c.description||"";
      const hay=(c.title+" "+c.concept_id+" "+chips.join(" ")+" "+kw+" "+desc).toLowerCase();
      if(!qTerms.some(t=>hay.includes(t)))return false;
    }
    if(aC.length&&!aC.every(ch=>chips.includes(ch)))return false;
    if(aExams.length&&!aExams.every(ex=>exams.includes(ex)))return false;
    if(minExams>0&&exams.length<minExams)return false;
    return true;
  });
  sortList(fl);
  var total=fl.length;
  var show=fl.slice(0,MAX_CARDS);
  var parts=[total+" concept"+(total!==1?"s":"")];
  if(aC.length) parts.push("matching "+aC.length+" filter"+(aC.length>1?"s":""));
  if(aExams.length) parts.push("in exam"+(aExams.length>1?"s ":" ")+aExams.join(", "));
  if(minExams>0) parts.push("with "+minExams+"+ exams");
  cE.textContent=parts.join(" ");
  renderCards(show,total);
}

document.addEventListener("click",()=>{if(instOpen){instOpen=false;
  const d=document.querySelector(".inst-drop");if(d)d.classList.remove("open")}});

var debounceTimer=null;
sE.addEventListener("input",function(){clearTimeout(debounceTimer);debounceTimer=setTimeout(render,200)});
sortSel.addEventListener("change",render);
minExSel.addEventListener("change",render);
render();
})();
</script></body></html>
